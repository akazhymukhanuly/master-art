services:
  postgres:
    image: postgres:16
    container_name: masterart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: masterart
      POSTGRES_PASSWORD: masterart
      POSTGRES_DB: masterart
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterart -d masterart"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: masterart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
